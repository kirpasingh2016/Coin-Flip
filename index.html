<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            text-align: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
            margin-top: 50px;
        }
        #coinDisplay{
            font-size: 100px;
            margin: 20px auto;
            transition: transform 0.8s ease-in-out;
        }
        button{
            padding: 10px 20px;
            font-size: 18px;
           cursor:pointer;
           color: white;
           font-weight: 900;
           background-color: rgb(236, 116, 136);
           border-radius: 10px;
           margin-bottom: 10px;
        }
        button:hover{
           background-color: rgb(175, 14, 41);

        }
    #coinImage{
        margin: 20px auto;
        height: 150px;
        width: 150px;
        transition: transform 0.8s ease-in-out;
        display: none;

    }
    #resultText{
        font-size: 20px;
        font-weight: 900;
        padding: 20px;
        
    }
    </style>
</head>
<body>
 <h1>Flip a Coin</h1>   
<div id="coinDisplay">❓</div>
<img id="coinImage" src="" alt="">
<div id="resultText"></div>
<button onclick="coinFlip()">Flip The Coin</button>
<script>
    function coinFlip(){
    const coinDisplay = document.getElementById("coinDisplay")
    const coinImage = document.getElementById("coinImage")
    const resultText = document.getElementById("resultText")
    let Heads_img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhOtDUX8yNwMw5A1XpAgUc6gDubgpdWfoAfw&s"
    let Tails_img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAJE3uq6nTkmcjHvoS49YPiN8egqZd6Aa7vg&s"

    coinDisplay.style.display = "block"
    coinDisplay.textContent = "🪙"
    coinImage.style.display = "none"
    resultText.textContent = ""

    coinDisplay.style.transform = "rotateY(0deg)"
    setTimeout(() => {
     coinDisplay.style.transform = "rotateY(720deg)"   
    }, 100);

 setTimeout(() => {
    const result = Math.random()<0.5?"Heads":"Tails"
    coinDisplay.style.display= "none"
    coinImage.style.display = "block"
    
    if (result=== "Heads") {
        coinImage.src=Heads_img
        resultText.textContent="Heads!"
    } else {
        coinImage.src=Tails_img
        resultText.textContent="Tails!"
    }
 }, 900);
    }






</script>

</body>
</html>
